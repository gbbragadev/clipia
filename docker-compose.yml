services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clipia
      POSTGRES_PASSWORD: clipia_dev
      POSTGRES_DB: clipia
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipia"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6382:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8005:8005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage
      - ./fonts:/app/fonts

  worker:
    build: .
    command: celery -A app.worker.celery_app worker -l info --concurrency=1
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage
      - ./fonts:/app/fonts

volumes:
  pgdata:
  redisdata:
